openapi: 3.1.0
info:
  title: Admin Portal API
  version: 0.1.0
  description: Contracts for the internal admin portal of the AI paper writing platform.
servers:
  - url: /api/admin
paths:
  /auth/login:
    post:
      summary: Admin login
      operationId: adminLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AdminLoginRequest'
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSessionResponse'
        '401':
          description: Invalid credentials
  /auth/me:
    get:
      summary: Get current admin session
      operationId: getAdminSession
      responses:
        '200':
          description: Current admin session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminSessionResponse'
        '401':
          description: Session missing or expired
  /auth/change-password:
    post:
      summary: Change own password
      operationId: changeAdminPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '204':
          description: Password changed
        '400':
          description: Validation failed
        '401':
          description: Current password invalid
  /orders:
    get:
      summary: Query orders
      operationId: listAdminOrders
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - in: query
          name: title
          schema:
            type: string
        - in: query
          name: userKeyword
          schema:
            type: string
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated order list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOrderListResponse'
  /orders/export:
    get:
      summary: Export filtered orders as CSV
      operationId: exportAdminOrders
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/OrderStatus'
        - in: query
          name: title
          schema:
            type: string
        - in: query
          name: userKeyword
          schema:
            type: string
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: CSV stream
          content:
            text/csv:
              schema:
                type: string
        '422':
          description: Export exceeds 10,000 rows
  /orders/{orderId}:
    get:
      summary: Get order detail
      operationId: getAdminOrder
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '200':
          description: Order detail with latest job summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOrderDetail'
        '404':
          description: Order not found
  /orders/{orderId}/note:
    patch:
      summary: Update order note
      operationId: updateOrderNote
      parameters:
        - $ref: '#/components/parameters/OrderId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OrderNoteUpdateRequest'
      responses:
        '200':
          description: Order note updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminOrderDetail'
        '404':
          description: Order not found
  /orders/{orderId}/retry-generation:
    post:
      summary: Retry failed order generation
      operationId: retryOrderGeneration
      parameters:
        - $ref: '#/components/parameters/OrderId'
      responses:
        '202':
          description: Retry accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJobSummary'
        '409':
          description: Order already has a running generation job
        '404':
          description: Order not found
  /generation-jobs:
    get:
      summary: Query generation jobs
      operationId: listGenerationJobs
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/GenerationJobStatus'
        - in: query
          name: attentionRequired
          schema:
            type: boolean
      responses:
        '200':
          description: Paginated generation jobs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJobListResponse'
  /generation-jobs/{jobId}:
    get:
      summary: Get generation job detail
      operationId: getGenerationJob
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Generation job detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenerationJobDetail'
        '404':
          description: Job not found
  /generation-jobs/{jobId}/cancel:
    post:
      summary: Cancel running generation job
      operationId: cancelGenerationJob
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '202':
          description: Cancel accepted
        '409':
          description: Job is not cancellable
  /generation-jobs/{jobId}/retry:
    post:
      summary: Retry failed generation job via its order
      operationId: retryGenerationJob
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '202':
          description: Retry accepted
        '409':
          description: Parent order already has a running job
  /school-templates:
    get:
      summary: Query school templates
      operationId: listSchoolTemplates
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: schoolName
          schema:
            type: string
        - in: query
          name: degreeType
          schema:
            $ref: '#/components/schemas/DegreeType'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/TemplateStatus'
      responses:
        '200':
          description: Paginated template groups
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolTemplateListResponse'
    post:
      summary: Create school template
      operationId: createSchoolTemplate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolTemplateUpsertRequest'
      responses:
        '201':
          description: Template created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolTemplate'
        '409':
          description: Duplicate school + degree combination
  /school-templates/{templateId}:
    patch:
      summary: Update school template
      operationId: updateSchoolTemplate
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SchoolTemplateUpsertRequest'
      responses:
        '200':
          description: Template updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchoolTemplate'
  /school-templates/{templateId}/enable:
    post:
      summary: Enable school template
      operationId: enableSchoolTemplate
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      responses:
        '204':
          description: Enabled
  /school-templates/{templateId}/disable:
    post:
      summary: Disable school template
      operationId: disableSchoolTemplate
      parameters:
        - $ref: '#/components/parameters/TemplateId'
      responses:
        '204':
          description: Disabled
  /template-requests:
    get:
      summary: Query user-submitted school template requests
      operationId: listTemplateRequests
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/TemplateRequestStatus'
      responses:
        '200':
          description: Paginated template requests
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateRequestListResponse'
  /template-requests/{requestId}:
    patch:
      summary: Update template request status
      operationId: updateTemplateRequest
      parameters:
        - $ref: '#/components/parameters/RequestId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TemplateRequestUpdateRequest'
      responses:
        '200':
          description: Request updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TemplateRequest'
  /users:
    get:
      summary: Query end users
      operationId: listUsers
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: userKeyword
          schema:
            type: string
        - in: query
          name: registeredFrom
          schema:
            type: string
            format: date-time
        - in: query
          name: registeredTo
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
  /users/{userId}:
    get:
      summary: Get user detail
      operationId: getUserDetail
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '200':
          description: User detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDetail'
  /users/{userId}/disable:
    post:
      summary: Disable user for future logins
      operationId: disableUser
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type: string
      responses:
        '204':
          description: User disabled
  /users/{userId}/risk-controls:
    patch:
      summary: Update user risk controls
      operationId: updateUserRiskControls
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRiskControlRequest'
      responses:
        '200':
          description: Risk control updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserRiskControl'
  /configs/api:
    get:
      summary: List API configurations
      operationId: listApiConfigs
      responses:
        '200':
          description: API config list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ApiConfig'
  /configs/system:
    get:
      summary: Get system configuration
      operationId: getSystemConfig
      responses:
        '200':
          description: System config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemConfig'
    put:
      summary: Update system configuration
      operationId: updateSystemConfig
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemConfigUpdateRequest'
      responses:
        '200':
          description: Updated system config
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemConfig'
  /configs/api/{configType}:
    put:
      summary: Upsert API configuration
      operationId: upsertApiConfig
      parameters:
        - in: path
          name: configType
          required: true
          schema:
            $ref: '#/components/schemas/ApiConfigType'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiConfigUpsertRequest'
      responses:
        '200':
          description: Config saved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiConfig'
        '422':
          description: Connectivity validation failed
  /dashboard/overview:
    get:
      summary: Get overview cards
      operationId: getDashboardOverview
      parameters:
        - $ref: '#/components/parameters/TimeRange'
      responses:
        '200':
          description: Overview metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardOverview'
  /dashboard/funnel:
    get:
      summary: Get funnel metrics
      operationId: getDashboardFunnel
      parameters:
        - $ref: '#/components/parameters/TimeRange'
      responses:
        '200':
          description: Funnel metrics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FunnelResponse'
  /dashboard/revenue:
    get:
      summary: Get revenue distribution
      operationId: getDashboardRevenue
      parameters:
        - $ref: '#/components/parameters/TimeRange'
      responses:
        '200':
          description: Revenue distribution
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RevenueResponse'
  /products:
    get:
      summary: Query products
      operationId: listProducts
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/ProductStatus'
      responses:
        '200':
          description: Product list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductListResponse'
    post:
      summary: Create product
      operationId: createProduct
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpsertRequest'
      responses:
        '201':
          description: Product created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
  /products/{productId}:
    patch:
      summary: Update product
      operationId: updateProduct
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductUpsertRequest'
      responses:
        '200':
          description: Product updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Product not found
  /products/{productId}/activate:
    post:
      summary: Activate product
      operationId: activateProduct
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '204':
          description: Product activated
  /products/{productId}/deactivate:
    post:
      summary: Deactivate product
      operationId: deactivateProduct
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '204':
          description: Product deactivated
  /payments:
    get:
      summary: Query payments
      operationId: listPayments
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Payment list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentListResponse'
  /payments/{paymentId}:
    get:
      summary: Get payment detail
      operationId: getPaymentDetail
      parameters:
        - $ref: '#/components/parameters/PaymentId'
      responses:
        '200':
          description: Payment detail
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaymentDetail'
        '404':
          description: Payment not found
  /operation-logs:
    get:
      summary: Query operation logs
      operationId: listOperationLogs
      parameters:
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/PageSize'
        - in: query
          name: actionType
          schema:
            type: string
        - in: query
          name: targetType
          schema:
            type: string
        - in: query
          name: from
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Operation logs
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationLogListResponse'
components:
  parameters:
    Page:
      in: query
      name: page
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      in: query
      name: pageSize
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    OrderId:
      in: path
      name: orderId
      required: true
      schema:
        type: string
        format: uuid
    JobId:
      in: path
      name: jobId
      required: true
      schema:
        type: string
        format: uuid
    TemplateId:
      in: path
      name: templateId
      required: true
      schema:
        type: string
        format: uuid
    RequestId:
      in: path
      name: requestId
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      in: path
      name: userId
      required: true
      schema:
        type: string
        format: uuid
    ProductId:
      in: path
      name: productId
      required: true
      schema:
        type: string
        format: uuid
    PaymentId:
      in: path
      name: paymentId
      required: true
      schema:
        type: string
        format: uuid
    TimeRange:
      in: query
      name: range
      schema:
        type: string
        enum: [day, week, month]
        default: week
  schemas:
    AdminRole:
      type: string
      enum: [SUPER_ADMIN, OPERATOR, CUSTOMER_SERVICE, READ_ONLY]
    OrderStatus:
      type: string
      enum: [PENDING_PAYMENT, GENERATING, COMPLETED, FAILED]
    GenerationJobStatus:
      type: string
      enum: [QUEUED, RUNNING, COMPLETED, FAILED]
    DegreeType:
      type: string
      enum: [COLLEGE, BACHELOR, MASTER, DOCTOR]
    TemplateStatus:
      type: string
      enum: [ENABLED, DISABLED]
    TemplateRequestStatus:
      type: string
      enum: [PENDING, FULFILLED, IGNORED]
    ApiConfigType:
      type: string
      enum: [PLAGIARISM, CITATION_CHECK]
    ProductStatus:
      type: string
      enum: [ACTIVE, INACTIVE]
    AdminLoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
    AdminSessionResponse:
      type: object
      required: [adminUserId, username, role]
      properties:
        adminUserId:
          type: string
          format: uuid
        username:
          type: string
        role:
          $ref: '#/components/schemas/AdminRole'
    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
    AdminOrderSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        productName:
          type: string
        createdAt:
          type: string
          format: date-time
        attentionRequired:
          type: boolean
    AdminOrderListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/AdminOrderSummary'
        total:
          type: integer
    GenerationJobSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderId:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/GenerationJobStatus'
        attemptNo:
          type: integer
        attentionRequired:
          type: boolean
    GenerationJobDetail:
      allOf:
        - $ref: '#/components/schemas/GenerationJobSummary'
        - type: object
          properties:
            terminalReason:
              type: string
            failureMessage:
              type: string
            startedAt:
              type: string
              format: date-time
            finishedAt:
              type: string
              format: date-time
            logs:
              type: array
              items:
                type: object
                properties:
                  createdAt:
                    type: string
                    format: date-time
                  eventType:
                    type: string
                  message:
                    type: string
    GenerationJobListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GenerationJobSummary'
        total:
          type: integer
    AdminOrderDetail:
      allOf:
        - $ref: '#/components/schemas/AdminOrderSummary'
        - type: object
          properties:
            note:
              type: string
            latestJob:
              $ref: '#/components/schemas/GenerationJobSummary'
            payment:
              type: object
              additionalProperties: true
    OrderNoteUpdateRequest:
      type: object
      required: [note]
      properties:
        note:
          type: string
          maxLength: 2000
    SchoolTemplate:
      type: object
      properties:
        id:
          type: string
          format: uuid
        schoolName:
          type: string
        degreeType:
          $ref: '#/components/schemas/DegreeType'
        status:
          $ref: '#/components/schemas/TemplateStatus'
        citationStyle:
          type: string
    SchoolTemplateUpsertRequest:
      type: object
      required: [schoolName, degreeType, templateFilePath, citationStyle]
      properties:
        schoolName:
          type: string
        degreeType:
          $ref: '#/components/schemas/DegreeType'
        templateFilePath:
          type: string
        citationStyle:
          type: string
        headingConfig:
          type: object
          additionalProperties: true
        pageLayoutConfig:
          type: object
          additionalProperties: true
    SchoolTemplateListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              schoolName:
                type: string
              templates:
                type: array
                items:
                  $ref: '#/components/schemas/SchoolTemplate'
        total:
          type: integer
    TemplateRequest:
      type: object
      properties:
        id:
          type: string
          format: uuid
        schoolName:
          type: string
        status:
          $ref: '#/components/schemas/TemplateRequestStatus'
        linkedTemplateId:
          type: string
          format: uuid
    TemplateRequestUpdateRequest:
      type: object
      required: [status]
      properties:
        status:
          $ref: '#/components/schemas/TemplateRequestStatus'
        linkedTemplateId:
          type: string
          format: uuid
    TemplateRequestListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TemplateRequest'
        total:
          type: integer
    UserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        maskedDisplay:
          type: string
        orderCount:
          type: integer
    UserDetail:
      allOf:
        - $ref: '#/components/schemas/UserSummary'
        - type: object
          properties:
            completedOrderCount:
              type: integer
            failedOrderCount:
              type: integer
            riskControl:
              $ref: '#/components/schemas/UserRiskControl'
    UserListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserSummary'
        total:
          type: integer
    UserRiskControlRequest:
      type: object
      properties:
        dailyGenerationLimit:
          type: integer
        reason:
          type: string
    UserRiskControl:
      type: object
      properties:
        isDisabled:
          type: boolean
        dailyGenerationLimit:
          type: integer
        reason:
          type: string
    ApiConfig:
      type: object
      properties:
        configType:
          $ref: '#/components/schemas/ApiConfigType'
        providerName:
          type: string
        baseUrl:
          type: string
        secretMasked:
          type: string
          example: '****'
        isEnabled:
          type: boolean
        updatedAt:
          type: string
          format: date-time
    ApiConfigUpsertRequest:
      type: object
      required: [providerName, baseUrl, isEnabled]
      properties:
        providerName:
          type: string
        baseUrl:
          type: string
        secret:
          type: string
        isEnabled:
          type: boolean
        rateLimitConfig:
          type: object
          additionalProperties: true
    SystemConfig:
      type: object
      properties:
        maintenanceMode:
          type: boolean
        defaultWordCountOptions:
          type: array
          items:
            type: integer
        referenceCountSuggestions:
          type: object
          additionalProperties:
            type: integer
        updatedAt:
          type: string
          format: date-time
    SystemConfigUpdateRequest:
      type: object
      properties:
        maintenanceMode:
          type: boolean
        defaultWordCountOptions:
          type: array
          items:
            type: integer
        referenceCountSuggestions:
          type: object
          additionalProperties:
