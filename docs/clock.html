<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>当前时间</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #e2e8f0;
      }
      main {
        text-align: center;
        padding: 2rem;
        border-radius: 1rem;
        background: rgba(15, 23, 42, 0.85);
        border: 1px solid rgba(148, 163, 184, 0.35);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.45);
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.125rem;
        font-weight: 600;
        letter-spacing: 0.02em;
        color: #94a3b8;
      }
      #time {
        font-size: clamp(1.75rem, 4vw, 2.75rem);
        font-variant-numeric: tabular-nums;
        letter-spacing: 0.04em;
      }
      .hint {
        margin-top: 1.25rem;
        font-size: 0.8rem;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>当前时间</h1>
      <div id="time" aria-live="polite">—</div>
      <p class="hint">每秒自动刷新（本机时间）</p>
    </main>
    <script>
      const el = document.getElementById("time");
      function tick() {
        const now = new Date();
        el.textContent = now.toLocaleString("zh-CN", {
          weekday: "short",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false,
        });
      }
      tick();
      setInterval(tick, 1000);
    </script>
  </body>
</html>
